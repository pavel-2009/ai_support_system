name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Redis
        uses: redis/redis-stack-action@v1

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite+aiosqlite:///./app.db
          JWT_SECRET_KEY: test-secret-key
          PYTHONPATH: .
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml --junitxml=pytest-report.xml

      - name: Publish coverage and test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            app/coverage.xml
            app/pytest-report.xml

      - name: Coverage summary
        if: always()
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse('coverage.xml').getroot()
          line_rate = float(root.attrib.get('line-rate', 0)) * 100
          with open('/tmp/summary.md', 'w', encoding='utf-8') as f:
            f.write(f"## Coverage\n\nLine coverage: **{line_rate:.2f}%**\n")
          PY
          cat /tmp/summary.md >> "$GITHUB_STEP_SUMMARY"
