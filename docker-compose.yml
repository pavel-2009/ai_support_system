services:
  web:
    build: ./app
    ports:
      - "8001:8001"
    volumes:
      - ./app:/app
    environment:
      - PYTHONPATH=/app
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8001"
    depends_on:
      - redis
      - celery
      - postgres

  postgres:
    image: "postgres:13-alpine"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"

  celery:
    build: ./app
    command: celery -A main:celery_app worker --loglevel=info
    volumes:
      - ./app:/app
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis