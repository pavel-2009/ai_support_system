services:
  web:
    build: ./app
    ports:
      - "8001:8001"
    volumes:
      - ./app:/app
    environment:
      - PYTHONPATH=/app
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8001"
    depends_on:
      - redis
      - celery

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"

  celery:
    build: ./app
    command: celery -A main:celery_app worker --loglevel=info
    volumes:
      - ./app:/app
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis